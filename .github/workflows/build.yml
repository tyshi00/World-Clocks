name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GPR_TOKEN }}
      GH_PACKAGES_USER: ${{ github.actor }}
      GH_PACKAGES_TOKEN: ${{ secrets.GPR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Point Gradle at the Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :worldclocks:assembleDebug --console=plain

      - name: Rename APK
        run: cp worldclocks/build/outputs/apk/debug/worldclocks-debug.apk worldclocks/build/outputs/apk/debug/worldclocks-release-candidate.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: worldclocks
          path: worldclocks/build/outputs/apk/debug/worldclocks-release-candidate.apk

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: worldclocks/build/outputs/apk/debug/worldclocks-release-candidate.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
